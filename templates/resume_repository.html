{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <h2 class="mb-4">

        <i class="fas fa-folder-open text-primary"></i>

        Resume Repository

    </h2>

    <div class="dashboard-card p-4">

        <h4 class="mb-4">

            <i class="fas fa-folder-open text-primary"></i>

            Uploaded Resumes

        </h4>

        <table class="table table-bordered table-hover align-middle">

            <thead class="table-light">

                <tr>

                    <th width="50%">Resume Name</th>

                    <th width="25%">Uploaded Date</th>

                    <th width="25%" class="text-center">Action</th>

                </tr>

            </thead>

            <tbody>

                {% if resumes %}

                    {% for resume in resumes %}

                    <tr>

                        <td>{{ resume.filename }}</td>

                        <td>{{ resume.date }}</td>

                        <td class="text-center">

                            <a href="{{ url_for('download_resume', stored_filename=resume.stored_filename) }}"
                               class="btn btn-success btn-sm me-2">

                                <i class="fas fa-download"></i>

                                Download

                            </a>

                            <a href="{{ url_for('delete_resume', stored_filename=resume.stored_filename) }}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this resume?')">

                                <i class="fas fa-trash"></i>

                                Delete

                            </a>

                        </td>

                    </tr>

                    {% endfor %}

                {% else %}

                    <tr>

                        <td colspan="3" class="text-center py-4">

                            No resumes uploaded yet.

                        </td>

                    </tr>

                {% endif %}

            </tbody>

        </table>

    </div>

</div>

{% endblock %}
